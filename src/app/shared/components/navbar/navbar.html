<nav class="shadow-lg py-4" style="background-color: var(--base-200);">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center">
            <a routerLink="/" class="triviup text-4xl font-bold text-white">TriviUp</a>
            <ul class="flex gap-6 items-center">
                <li><a routerLink="/quizzes/public" class="hover:opacity-80 transition-opacity"
                        style="color: var(--base-content);">Explorar</a></li>
                <li><a href="#info" class="hover:opacity-80 transition-opacity"
                        style="color: var(--base-content);">Información</a></li>
                <li><a href="#contacto" class="hover:opacity-80 transition-opacity"
                        style="color: var(--base-content);">Contacto</a></li>
                @if (isLoggedIn()) {
                    <!-- User info + dropdown -->
                    <li class="dropdown dropdown-end">
                        <!-- User photo and name (visible trigger) -->
                        <button tabindex="0" role="button"
                            class="flex items-center gap-2 px-4 py-2 rounded-lg hover:opacity-90 transition-opacity"
                            style="background-color: var(--primary); color: var(--primary-content);">
                            <app-profile-photo [photoUrl]="currentUser()?.profilePhotoUrl ?? null"
                                [username]="currentUser()?.username ?? ''" size="sm" [showInitials]="true" />
                            <span class="font-semibold hidden sm:inline">{{ currentUser()?.username }}</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                        </button>
                        <ul tabindex="0"
                            class="dropdown-content z-50 menu p-2 shadow-lg rounded-lg w-56 mt-2"
                            style="background-color: var(--base-200);">
                            <li class="px-4 py-3 border-b" style="border-color: var(--base-300);">
                                <div>
                                    <p class="text-sm font-semibold" style="color: var(--base-content);">
                                        {{ currentUser()?.username }}</p>
                                    <p class="text-xs opacity-60" style="color: var(--base-content);">
                                        {{ currentUser()?.email }}</p>
                                </div>
                            </li>
                            <li><a routerLink="/perfil" class="flex items-center gap-2"
                                    style="color: var(--base-content);">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                    Mi Perfil
                                </a></li>
                            <li><a routerLink="/perfil/editar" class="flex items-center gap-2"
                                    style="color: var(--base-content);">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                    Editar Perfil
                                </a></li>
                            <li><a routerLink="/cuestionarios/mis-cuestionarios" class="flex items-center gap-2"
                                    style="color: var(--base-content);">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                    </svg>
                                    Mis Cuestionarios
                                </a></li>
                            <li><button (click)="logout()" class="flex items-center gap-2 w-full"
                                    style="color: var(--base-content);">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                    Cerrar Sesión
                                </button></li>
                        </ul>
                    </li>
                } @else {
                    <li>
                        <a routerLink="/auth"
                            class="px-6 py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity"
                            style="background-color: var(--primary); color: var(--primary-content);">
                            Iniciar Sesión
                        </a>
                    </li>
                }
            </ul>
        </div>
    </div>
</nav>
