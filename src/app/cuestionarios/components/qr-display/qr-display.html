<div class="qr-container">
    <p class="qr-label">Escanea para unirte</p>
    
    @if (isLoading()) {
        <div class="qr-loading">
            <span class="loading loading-spinner loading-md text-primary"></span>
        </div>
    } @else if (hasError()) {
        <div class="qr-error">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <p class="text-error text-sm mt-2">Error al cargar el código QR</p>
        </div>
    } @else {
        <div class="qr-image-wrapper">
            <img 
                [src]="qrImageUrl()" 
                [alt]="'Código QR para ' + data"
                [width]="size"
                [height]="size"
                class="qr-image"
                (load)="onImageLoad()"
                (error)="onImageError()"
            />
        </div>
        
        <button 
            class="btn btn-sm btn-download mt-3"
            (click)="descargarQr()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Descargar QR
        </button>
    }
</div>
