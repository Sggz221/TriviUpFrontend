log_format debug_log '[$time_local] "$request" '
    'upstream: $upstream_addr '
    'upstream_status: $upstream_status '
    'status: $status '
    'host: $host '
    'x-forwarded-for: $proxy_add_x_forwarded_for '
    'x-forwarded-proto: $scheme';

# Also log to stderr for Railway logs
error_log /dev/stderr info;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Debug: log all errors
    error_log /dev/stderr info;

    # Configuración para Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para archivos subidos (imágenes de preguntas, avatares, etc.)
    location /uploads/ {
        proxy_pass https://triviup-backend-production.up.railway.app:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        access_log /dev/stdout debug_log;
        error_log /dev/stderr info;
    }

    # Proxy para el StorageController del backend (^~ para evitar que regex de static files capture estas peticiones)
    location ^~ /storage/ {
        proxy_pass https://triviup-backend-production.up.railway.app:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        access_log /dev/stdout debug_log;
        error_log /dev/stderr info;
    }

    # Proxy para la API del backend
    location /api/ {
        proxy_pass https://triviup-backend-production.up.railway.app:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        access_log /dev/stdout debug_log;
        error_log /dev/stderr info;
    }

    # Proxy para SignalR hubs
    location /hubs/ {
        proxy_pass https://triviup-backend-production.up.railway.app:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        access_log /dev/stdout debug_log;
        error_log /dev/stderr info;
    }

    # Proxy para auth (signin, signup, google oauth) - excepto /auth/callback que lo maneja Angular
    location /auth/ {
        proxy_pass https://triviup-backend-production.up.railway.app:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        access_log /dev/stdout debug_log;
        error_log /dev/stderr info;
    }

    # Excluir /auth/callback del proxy - Angular lo maneja (recibe el token de Google OAuth)
    location = /auth/callback {
        try_files $uri $uri/ /index.html;
    }

    # Configuración de caché para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
}