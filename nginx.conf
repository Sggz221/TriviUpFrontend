log_format debug_log '[$time_local] "$request" '
    'upstream: $upstream_addr '
    'upstream_status: $upstream_status '
    'status: $status '
    'host: $host '
    'x-forwarded-for: $proxy_add_x_forwarded_for '
    'x-forwarded-proto: $scheme';

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Configuración para Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para archivos subidos (imágenes de preguntas, avatares, etc.)
    location /uploads/ {
        proxy_pass http://TriviUp-Backend.railway.internal:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        access_log /var/log/nginx/uploads_access.log debug_log;
        error_log /var/log/nginx/uploads_error.log debug;
    }

    # Proxy para el StorageController del backend (^~ para evitar que regex de static files capture estas peticiones)
    location ^~ /storage/ {
        proxy_pass http://TriviUp-Backend.railway.internal:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        access_log /var/log/nginx/storage_access.log debug_log;
        error_log /var/log/nginx/storage_error.log debug;
    }

    # Proxy para la API del backend
    location /api/ {
        proxy_pass http://TriviUp-Backend.railway.internal:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        access_log /var/log/nginx/api_access.log debug_log;
        error_log /var/log/nginx/api_error.log debug;
    }

    # Excluir /auth/callback del proxy - Angular lo maneja
    location = /auth/callback {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para auth (signin, signup, google oauth) - excepto callback
    location /auth/ {
        proxy_pass http://TriviUp-Backend.railway.internal:5164;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        access_log /var/log/nginx/auth_access.log debug_log;
        error_log /var/log/nginx/auth_error.log debug;
    }

    # Configuración de caché para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
}